<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人帳單記錄與管理</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f5f6fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h2 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-control {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--primary-color);
            color: white;
        }
        tr:hover {
            background-color: #f1f2f6;
        }
        .status-btn {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            border: none;
            color: white;
        }
        .paid { background-color: var(--success-color); }
        .unpaid { background-color: var(--danger-color); }
        .delete-btn {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .delete-btn:hover { background-color: #95a5a6; }
        
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            th { display: none; }
            td {
                position: relative;
                padding-left: 50%;
                text-align: right;
            }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 10px;
                width: 45%;
                padding-right: 10px;
                text-align: left;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>

    <h2>📝 帳單記錄與管理</h2>

    <div class="card">
        <form id="billForm">
            <div class="form-group">
                <div class="form-control">
                    <label for="title">帳單標題 (例如：電費、信用卡)</label>
                    <input type="text" id="title" required placeholder="請輸入帳單名稱">
                </div>
                <div class="form-control">
                    <label for="amount">帳單金額 (NT$)</label>
                    <input type="number" id="amount" required placeholder="0" min="0">
                </div>
            </div>
            <div class="form-group">
                <div class="form-control">
                    <label for="dueDate">截止時間</label>
                    <input type="date" id="dueDate" required>
                </div>
                <div class="form-control">
                    <label for="method">預計/實際繳費方式</label>
                    <select id="method">
                        <option value="信用卡">信用卡</option>
                        <option value="Line Pay">Line Pay</option>
                        <option value="悠遊付">悠遊付</option>
                        <option value="銀行轉帳">銀行轉帳</option>
                        <option value="現金/超商">現金/超商</option>
                    </select>
                </div>
            </div>
            <button type="submit" style="width: 100%;">新增帳單</button>
        </form>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>帳單標題</th>
                    <th>金額</th>
                    <th>截止時間</th>
                    <th>繳費方式</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="billList">
                </tbody>
        </table>
    </div>

    <script>
        // 初始化載入 LocalStorage 中的資料
        let bills = JSON.parse(localStorage.getItem('myBills')) || [];

        const billForm = document.getElementById('billForm');
        const billList = document.getElementById('billList');

        // 監聽表單提交事件
        billForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const amount = document.getElementById('amount').value;
            const dueDate = document.getElementById('dueDate').value;
            const method = document.getElementById('method').value;

            const newBill = {
                id: Date.now(), // 使用時間戳記作為唯一ID
                title: title,
                amount: amount,
                dueDate: dueDate,
                method: method,
                isPaid: false // 預設為未繳
            };

            bills.push(newBill);
            saveData();
            renderBills();
            billForm.reset();
        });

        // 切換已繳/未繳狀態
        function toggleStatus(id) {
            bills = bills.map(bill => {
                if (bill.id === id) {
                    return { ...bill, isPaid: !bill.isPaid };
                }
                return bill;
            });
            saveData();
            renderBills();
        }

        // 刪除帳單
        function deleteBill(id) {
            if(confirm('確定要刪除這筆帳單記錄嗎？')) {
                bills = bills.filter(bill => bill.id !== id);
                saveData();
                renderBills();
            }
        }

        // 儲存至 LocalStorage
        function saveData() {
            localStorage.setItem('myBills', JSON.stringify(bills));
        }

        // 渲染畫面
        function renderBills() {
            billList.innerHTML = '';
            
            // 依據截止日期排序（由近到遠）
            bills.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

            bills.forEach(bill => {
                const tr = document.createElement('tr');
                
                // 判斷狀態按鈕的樣式與文字
                const statusClass = bill.isPaid ? 'paid' : 'unpaid';
                const statusText = bill.isPaid ? '已繳清' : '未繳納';

                // 加上貨幣格式
                const formattedAmount = new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(bill.amount);

                tr.innerHTML = `
                    <td data-label="帳單標題">${bill.title}</td>
                    <td data-label="金額" style="color: ${bill.isPaid ? '#7f8c8d' : '#e74c3c'}; font-weight: bold;">${formattedAmount}</td>
                    <td data-label="截止時間">${bill.dueDate}</td>
                    <td data-label="繳費方式">${bill.method}</td>
                    <td data-label="狀態">
                        <button class="status-btn ${statusClass}" onclick="toggleStatus(${bill.id})">
                            ${statusText}
                        </button>
                    </td>
                    <td data-label="操作">
                        <button class="delete-btn" onclick="deleteBill(${bill.id})">刪除</button>
                    </td>
                `;
                billList.appendChild(tr);
            });
        }

        // 初始執行渲染
        renderBills();
    </script>
</body>
</html>

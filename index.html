<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人帳單記錄與管理</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f5f6fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h2 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        #syncMsg {
            display: none;
            text-align: center;
            padding: 10px;
            background-color: #d1d8e0;
            color: #2bcbba;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        #summaryCard {
            background-color: #f0f8ff; 
            border-left: 5px solid #3498db;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #b2bec3;
            font-size: 1.1em;
        }
        .summary-item:last-child {
            border-bottom: none;
        }
        .summary-amount {
            color: var(--danger-color);
            font-weight: bold;
        }
        .method-summary-title {
            margin: 20px 0 10px 0;
            padding-top: 15px;
            border-top: 2px dashed #bdc3c7;
            color: #34495e;
            font-size: 1.1em;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-control {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        .btn-cancel {
            background-color: #95a5a6;
        }
        .btn-cancel:hover {
            background-color: #7f8c8d;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--primary-color);
            color: white;
        }
        tr:hover {
            background-color: #f1f2f6;
        }
        .method-select {
            padding: 5px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: inherit;
            background-color: #fff;
            color: #333;
            cursor: pointer;
        }
        .status-btn {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            border: none;
            color: white;
        }
        .paid { background-color: var(--success-color); }
        .unpaid { background-color: var(--danger-color); }
        
        .action-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            border: none;
            color: white;
        }
        .cal-btn { background-color: #3498db; }
        .edit-btn { background-color: #f39c12; }
        .delete-btn { background-color: #7f8c8d; }
        .cal-btn:hover { background-color: #2980b9; }
        .edit-btn:hover { background-color: #e67e22; }
        .delete-btn:hover { background-color: #95a5a6; }
        
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            th { display: none; }
            tr {
                margin-bottom: 25px; 
                border: 2px solid #bdc3c7; 
                border-radius: 10px; 
                box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
                background-color: #fafafa; 
                overflow: hidden;
            }
            td {
                position: relative;
                padding: 15px 15px 15px 50%;
                text-align: right;
                border-bottom: 1px solid #ecf0f1; 
                min-height: 25px;
            }
            td:last-child {
                border-bottom: none;
                background-color: #f8f9fa; 
            }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                top: 50%;
                transform: translateY(-50%);
                width: 45%;
                padding-right: 10px;
                text-align: left;
                font-weight: bold;
                color: #2c3e50;
            }
            .method-select {
                max-width: 130px;
            }
            .action-group {
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>

    <h2>📝 帳單記錄與管理</h2>
    
    <div id="syncMsg">☁️ 正在與雲端同步資料...</div>

    <div class="card">
        <form id="billForm">
            <div class="form-group">
                <div class="form-control">
                    <label for="title">帳單標題 (例如：電費、信用卡)</label>
                    <input type="text" id="title" required placeholder="請輸入帳單名稱">
                </div>
                <div class="form-control">
                    <label for="amount">帳單金額 (NT$)</label>
                    <input type="number" id="amount" required placeholder="0" min="0">
                </div>
            </div>
            <div class="form-group">
                <div class="form-control">
                    <label for="dueDate">截止時間</label>
                    <input type="date" id="dueDate" required>
                </div>
                <div class="form-control">
                    <label for="reminder">提醒時間 (自動加入行事曆用)</label>
                    <select id="reminder">
                        <option value="-P1D">前一天</option>
                        <option value="-P3D">前三天</option>
                        <option value="-P7D">前一週</option>
                        <option value="PT0H">當天</option>
                    </select>
                </div>
                <div class="form-control">
                    <label for="method">預計/實際繳費方式</label>
                    <select id="method">
                        <option value="信用卡">信用卡</option>
                        <option value="Line Pay">Line Pay</option>
                        <option value="全支付">全支付</option>
                        <option value="悠遊付">悠遊付</option>
                        <option value="icash">icash</option>
                        <option value="悠遊卡">悠遊卡</option>
                        <option value="銀行轉帳">銀行轉帳</option>
                        <option value="現金/超商">現金/超商</option>
                    </select>
                </div>
            </div>
            <div class="btn-group">
                <button type="submit" id="submitBtn" style="flex: 2;">新增帳單</button>
                <button type="button" id="cancelEditBtn" class="btn-cancel" onclick="cancelEdit()" style="display: none; flex: 1;">取消編輯</button>
            </div>
        </form>
    </div>

    <div class="card" id="summaryCard" style="display: none;">
        <h3 style="margin-top: 0; color: #2c3e50; font-size: 1.2em;">📊 應繳統計 (尚未繳納)</h3>
        <div id="summaryContent"></div>
        <div id="methodSummaryContent" style="display: none;"></div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>帳單標題</th>
                    <th>金額</th>
                    <th>截止時間</th>
                    <th>繳費方式</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="billList"></tbody>
        </table>
    </div>

    <script>
        // 你的 Google Apps Script 網址
        const API_URL = 'https://script.google.com/macros/s/AKfycbyPht0aPv3z-D9wPyJ_ldSCaUhNklQc6ZUeEy6ePPKTRqjl20XN6kpDQ00ywqzLfat-/exec';
        
        const availableMethods = ['信用卡', 'Line Pay', '全支付', '悠遊付', 'icash', '悠遊卡', '銀行轉帳', '現金/超商'];
        let bills = [];
        let editingId = null; 

        const billForm = document.getElementById('billForm');
        const billList = document.getElementById('billList');
        const summaryCard = document.getElementById('summaryCard');
        const summaryContent = document.getElementById('summaryContent');
        const methodSummaryContent = document.getElementById('methodSummaryContent');
        const syncMsg = document.getElementById('syncMsg');
        const submitBtn = document.getElementById('submitBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');

        // 網頁載入時，從 Google 雲端抓取資料
        window.onload = async function() {
            syncMsg.style.display = 'block';
            syncMsg.innerText = '☁️ 正在從雲端讀取資料...';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                bills = Array.isArray(data) ? data : [];
                renderBills();
            } catch (error) {
                console.error('讀取失敗:', error);
            } finally {
                syncMsg.style.display = 'none';
            }
        };

        // 儲存資料到 Google 雲端
        async function saveDataToCloud() {
            syncMsg.style.display = 'block';
            syncMsg.innerText = '☁️ 正在將變更儲存至雲端...';
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(bills)
                });
            } catch (error) {
                console.error('儲存失敗:', error);
            } finally {
                syncMsg.style.display = 'none';
            }
        }

        // 提交表單 (新增 或 編輯)
        billForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const titleVal = document.getElementById('title').value;
            const amountVal = Number(document.getElementById('amount').value);
            const dueDateVal = document.getElementById('dueDate').value;
            const reminderVal = document.getElementById('reminder').value;
            const methodVal = document.getElementById('method').value;

            if (editingId) {
                // 更新現有帳單
                bills = bills.map(bill => {
                    if (bill.id === editingId) {
                        return { ...bill, title: titleVal, amount: amountVal, dueDate: dueDateVal, reminder: reminderVal, method: methodVal };
                    }
                    return bill;
                });
                cancelEdit(); 
            } else {
                // 建立新帳單
                const newBill = {
                    id: Date.now(),
                    title: titleVal,
                    amount: amountVal, 
                    dueDate: dueDateVal,
                    reminder: reminderVal,
                    method: methodVal,
                    isPaid: false
                };
                bills.push(newBill);
                billForm.reset();
            }
            
            renderBills();       
            saveDataToCloud();   
        });

        // 進入編輯模式
        function editBill(id) {
            const bill = bills.find(b => b.id === id);
            if (!bill) return;

            document.getElementById('title').value = bill.title;
            document.getElementById('amount').value = bill.amount;
            document.getElementById('dueDate').value = bill.dueDate;
            // 如果舊帳單沒有提醒時間，預設帶入前一天
            document.getElementById('reminder').value = bill.reminder || '-P1D'; 
            document.getElementById('method').value = bill.method;

            editingId = id;
            submitBtn.innerText = '💾 儲存修改';
            cancelEditBtn.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        // 取消編輯模式
        function cancelEdit() {
            editingId = null;
            billForm.reset();
            submitBtn.innerText = '新增帳單';
            cancelEditBtn.style.display = 'none';
        }

        // 下載/開啟 ICS 行事曆檔案 (加入 UID 防止重複建立)
        function addToCalendar(id) {
            const bill = bills.find(b => b.id === id);
            if (!bill) return;

            const dateStr = bill.dueDate.replace(/-/g, '');
            // 抓取帳單設定的提醒時間，舊帳單若無設定則預設前一天
            const reminderTrigger = bill.reminder || '-P1D'; 
            
            // 加入當下時間戳記與專屬 UID (讓 iOS 知道這是同一筆事件，以便覆蓋更新)
            const now = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
            const uid = `bill-${bill.id}@noah.tracker`;
            
            const icsData = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Noah Bill Tracker//TW\r\nBEGIN:VEVENT\r\nUID:${uid}\r\nDTSTAMP:${now}\r\nDTSTART;VALUE=DATE:${dateStr}\r\nSUMMARY:繳費：${bill.title}\r\nDESCRIPTION:金額：${bill.amount}元\\n方式：${bill.method}\r\nBEGIN:VALARM\r\nTRIGGER:${reminderTrigger}\r\nACTION:DISPLAY\r\nDESCRIPTION:Reminder\r\nEND:VALARM\r\nEND:VEVENT\r\nEND:VCALENDAR`;

            const blob = new Blob([icsData], { type: 'text/calendar;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', `繳費_${bill.title}.ics`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function toggleStatus(id) {
            bills = bills.map(bill => bill.id === id ? { ...bill, isPaid: !bill.isPaid } : bill);
            renderBills();
            saveDataToCloud();
        }

        function updateMethod(id, newMethod) {
            bills = bills.map(bill => bill.id === id ? { ...bill, method: newMethod } : bill);
            saveDataToCloud(); 
        }

        function deleteBill(id) {
            if(confirm('確定要刪除這筆帳單記錄嗎？')) {
                bills = bills.filter(bill => bill.id !== id);
                renderBills();
                saveDataToCloud();
            }
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(amount);
        }

        function renderBills() {
            billList.innerHTML = '';
            summaryContent.innerHTML = '';
            methodSummaryContent.innerHTML = '';
            
            bills.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
            
            const monthlyTotals = {};
            const methodTotals = {}; 

            bills.forEach(bill => {
                const tr = document.createElement('tr');
                const statusClass = bill.isPaid ? 'paid' : 'unpaid';
                const statusText = bill.isPaid ? '已繳清' : '未繳納';
                const formattedAmount = formatCurrency(bill.amount);

                const methodOptions = availableMethods.map(method => {
                    const selected = method === bill.method ? 'selected' : '';
                    return `<option value="${method}" ${selected}>${method}</option>`;
                }).join('');

                tr.innerHTML = `
                    <td data-label="帳單標題">${bill.title}</td>
                    <td data-label="金額" style="color: ${bill.isPaid ? '#7f8c8d' : '#e74c3c'}; font-weight: bold;">${formattedAmount}</td>
                    <td data-label="截止時間">${bill.dueDate}</td>
                    <td data-label="繳費方式">
                        <select class="method-select" onchange="updateMethod(${bill.id}, this.value)">
                            ${methodOptions}
                        </select>
                    </td>
                    <td data-label="狀態">
                        <button class="status-btn ${statusClass}" onclick="toggleStatus(${bill.id})">
                            ${statusText}
                        </button>
                    </td>
                    <td data-label="操作">
                        <div class="action-group">
                            <button type="button" class="action-btn cal-btn" onclick="addToCalendar(${bill.id})" title="加入行事曆">🗓️ 日曆</button>
                            <button type="button" class="action-btn edit-btn" onclick="editBill(${bill.id})">✏️ 編輯</button>
                            <button type="button" class="action-btn delete-btn" onclick="deleteBill(${bill.id})">🗑️</button>
                        </div>
                    </td>
                `;
                billList.appendChild(tr);

                // 計算統計 (僅計算未繳)
                if (!bill.isPaid && bill.dueDate) {
                    const yearMonth = bill.dueDate.substring(0, 7); 
                    if (!monthlyTotals[yearMonth]) monthlyTotals[yearMonth] = 0;
                    monthlyTotals[yearMonth] += Number(bill.amount);

                    if (!methodTotals[bill.method]) methodTotals[bill.method] = 0;
                    methodTotals[bill.method] += Number(bill.amount);
                }
            });

            // 渲染每月總計
            const activeMonths = Object.keys(monthlyTotals).sort(); 
            if (activeMonths.length > 0) {
                summaryCard.style.display = 'block'; 
                activeMonths.forEach(yearMonth => {
                    const [year, month] = yearMonth.split('-');
                    const displayMonth = `${year}年${parseInt(month, 10)}月`; 
                    const totalAmount = formatCurrency(monthlyTotals[yearMonth]);

                    const div = document.createElement('div');
                    div.className = 'summary-item';
                    div.innerHTML = `<span>📅 ${displayMonth}：</span> <span class="summary-amount">${totalAmount}</span>`;
                    summaryContent.appendChild(div);
                });
            } else {
                summaryCard.style.display = 'none'; 
            }

            // 渲染各繳費方式統計
            const activeMethods = Object.keys(methodTotals).sort();
            if (activeMethods.length > 0) {
                methodSummaryContent.style.display = 'block';
                methodSummaryContent.innerHTML = '<h4 class="method-summary-title">💳 未繳分類 (依繳費方式)</h4>';
                
                activeMethods.sort((a, b) => methodTotals[b] - methodTotals[a]).forEach(method => {
                    const totalAmount = formatCurrency(methodTotals[method]);
                    const div = document.createElement('div');
                    div.className = 'summary-item';
                    div.innerHTML = `<span>${method}：</span> <span class="summary-amount" style="color: #e67e22;">${totalAmount}</span>`;
                    methodSummaryContent.appendChild(div);
                });
            } else {
                methodSummaryContent.style.display = 'none';
            }
        }
    </script>
</body>
</html>

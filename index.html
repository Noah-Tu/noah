<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人帳單記錄與管理</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f5f6fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h2 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        #syncMsg {
            display: none;
            text-align: center;
            padding: 10px;
            background-color: #d1d8e0;
            color: #2bcbba;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        #summaryCard {
            background-color: #f0f8ff; 
            border-left: 5px solid #3498db;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #b2bec3;
            font-size: 1.1em;
        }
        .summary-item:last-child {
            border-bottom: none;
        }
        .summary-amount {
            color: var(--danger-color);
            font-weight: bold;
        }
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-control {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--primary-color);
            color: white;
        }
        tr:hover {
            background-color: #f1f2f6;
        }
        .method-select {
            padding: 5px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: inherit;
            background-color: #fff;
            color: #333;
            cursor: pointer;
        }
        .status-btn {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            border: none;
            color: white;
        }
        .paid { background-color: var(--success-color); }
        .unpaid { background-color: var(--danger-color); }
        .delete-btn {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .delete-btn:hover { background-color: #95a5a6; }
        
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            th { display: none; }
            tr {
                margin-bottom: 25px; 
                border: 2px solid #bdc3c7; 
                border-radius: 10px; 
                box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
                background-color: #fafafa; 
                overflow: hidden;
            }
            td {
                position: relative;
                padding: 15px 15px 15px 50%;
                text-align: right;
                border-bottom: 1px solid #ecf0f1; 
                min-height: 25px;
            }
            td:last-child {
                border-bottom: none;
                background-color: #f8f9fa; 
            }
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                top: 50%;
                transform: translateY(-50%);
                width: 45%;
                padding-right: 10px;
                text-align: left;
                font-weight: bold;
                color: #2c3e50;
            }
            .method-select {
                max-width: 130px;
            }
        }
    </style>
</head>

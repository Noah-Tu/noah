<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人帳單記錄與管理</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --bg-color: #f5f6fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h2 {
            color: var(--primary-color);
            text-align: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        /* 統計區塊特別樣式 */
        #summaryCard {
            background-color: #f0f8ff; 
            border-left: 5px solid #3498db;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #b2bec3;
            font-size: 1.1em;
        }
        .summary-item:last-child {
            border-bottom: none;
        }
        .summary-amount {
            color: var(--danger-color);
            font-weight: bold;
        }

        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-control {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: var(--primary-color);
            color: white;
        }
        tr:hover {
            background-color: #f1f2f6;
        }
        .status-btn {
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            border: none;
            color: white;
        }
        .paid { background-color: var(--success-color); }
        .unpaid { background-color: var(--danger-color); }
        .delete-btn {
            background-color: #7f8c8d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .delete-btn:hover { background-color: #95a5a6; }
        
        /* 手機版卡片化設計 */
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr {
                display: block;
            }
            th { display: none; }
            
            tr {
                margin-bottom: 25px; 
                border: 2px solid #bdc3c7; 
                border-radius: 10px; 
                box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
                background-color: #fafafa; 
                overflow: hidden;
            }
            
            td {
                position: relative;
                padding: 15px 15px 15px 50%;
                text-align: right;
                border-bottom: 1px solid #ecf0f1; 
            }
            
            td:last-child {
                border-bottom: none;
                background-color: #f8f9fa; 
            }
            
            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                width: 45%;
                padding-right: 10px;
                text-align: left;
                font-weight: bold;
                color: #2c3e50;
            }
        }
    </style>
</head>
<body>

    <h2>📝 帳單記錄與管理</h2>

    <div class="card">
        <form id="billForm">
            <div class="form-group">
                <div class="form-control">
                    <label for="title">帳單標題 (例如：電費、信用卡)</label>
                    <input type="text" id="title" required placeholder="請輸入帳單名稱">
                </div>
                <div class="form-control">
                    <label for="amount">帳單金額 (NT$)</label>
                    <input type="number" id="amount" required placeholder="0" min="0">
                </div>
            </div>
            <div class="form-group">
                <div class="form-control">
                    <label for="dueDate">截止時間</label>
                    <input type="date" id="dueDate" required>
                </div>
                <div class="form-control">
                    <label for="method">預計/實際繳費方式</label>
                    <select id="method">
                        <option value="信用卡">信用卡</option>
                        <option value="Line Pay">Line Pay</option>
                        <option value="悠遊付">悠遊付</option>
                        <option value="銀行轉帳">銀行轉帳</option>
                        <option value="現金/超商">現金/超商</option>
                    </select>
                </div>
            </div>
            <button type="submit" style="width: 100%;">新增帳單</button>
        </form>
    </div>

    <div class="card" id="summaryCard" style="display: none;">
        <h3 style="margin-top: 0; color: #2c3e50; font-size: 1.2em;">📊 每月應繳總計 (尚未繳納)</h3>
        <div id="summaryContent">
            </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>帳單標題</th>
                    <th>金額</th>
                    <th>截止時間</th>
                    <th>繳費方式</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="billList">
                </tbody>
        </table>
    </div>

    <div class="card" style="text-align: center; margin-top: 20px;">
        <h3 style="margin-top: 0; color: #2c3e50; font-size: 1.1em;">🔄 資料同步與備份</h3>
        <p style="font-size: 0.9em; color: #7f8c8d; margin-bottom: 15px;">若要在手機與電腦間轉移資料，請使用匯出與匯入功能。</p>
        <button onclick="exportData()" style="background-color: #f39c12; margin-right: 10px; margin-bottom: 10px;">📤 匯出資料代碼</button>
        <button onclick="importData()" style="background-color: #8e44ad; margin-bottom: 10px;">📥 貼上並匯入</button>
    </div>

    <script>
        // 初始化載入 LocalStorage 中的資料
        let bills = JSON.parse(localStorage.getItem('myBills')) || [];

        const billForm = document.getElementById('billForm');
        const billList = document.getElementById('billList');
        const summaryCard = document.getElementById('summaryCard');
        const summaryContent = document.getElementById('summaryContent');

        // 監聽表單提交事件
        billForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const amount = document.getElementById('amount').value;
            const dueDate = document.getElementById('dueDate').value;
            const method = document.getElementById('method').value;

            const newBill = {
                id: Date.now(),
                title: title,
                amount: Number(amount), // 確保儲存為數字格式
                dueDate: dueDate,
                method: method,
                isPaid: false
            };

            bills.push(newBill);
            saveData();
            renderBills();
            billForm.reset();
        });

        // 切換已繳/未繳狀態
        function toggleStatus(id) {
            bills = bills.map(bill => {
                if (bill.id === id) {
                    return { ...bill, isPaid: !bill.isPaid };
                }
                return bill;
            });
            saveData();
            renderBills();
        }

        // 刪除帳單
        function deleteBill(id) {
            if(confirm('確定要刪除這筆帳單記錄嗎？')) {
                bills = bills.filter(bill => bill.id !== id);
                saveData();
                renderBills();
            }
        }

        // 儲存至 LocalStorage
        function saveData() {
            localStorage.setItem('myBills', JSON.stringify(bills));
        }

        // 將數字格式化為台幣金額
        function formatCurrency(amount) {
            return new Intl.NumberFormat('zh-TW', { 
                style: 'currency', 
                currency: 'TWD', 
                minimumFractionDigits: 0 
            }).format(amount);
        }

        // 渲染畫面 (包含列表與統計)
        function renderBills() {
            // 1. 清空目前的列表與統計畫面
            billList.innerHTML = '';
            summaryContent.innerHTML = '';
            
            // 依據截止日期排序（由近到遠）
            bills.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

            // 用來存放每個月的總計金額
            const monthlyTotals = {};

            // 2. 產出列表並同時計算未繳金額
            bills.forEach(bill => {
                // 處理帳單列表的 HTML
                const tr = document.createElement('tr');
                const statusClass = bill.isPaid ? 'paid' : 'unpaid';
                const statusText = bill.isPaid ? '已繳清' : '未繳納';
                const formattedAmount = formatCurrency(bill.amount);

                tr.innerHTML = `
                    <td data-label="帳單標題">${bill.title}</td>
                    <td data-label="金額" style="color: ${bill.isPaid ? '#7f8c8d' : '#e74c3c'}; font-weight: bold;">${formattedAmount}</td>
                    <td data-label="截止時間">${bill.dueDate}</td>
                    <td data-label="繳費方式">${bill.method}</td>
                    <td data-label="狀態">
                        <button class="status-btn ${statusClass}" onclick="toggleStatus(${bill.id})">
                            ${statusText}
                        </button>
                    </td>
                    <td data-label="操作">
                        <button class="delete-btn" onclick="deleteBill(${bill.id})">刪除</button>
                    </td>
                `;
                billList.appendChild(tr);

                // 計算未繳金額統計
                if (!bill.isPaid && bill.dueDate) {
                    // 擷取 YYYY-MM
                    const yearMonth = bill.dueDate.substring(0, 7); 
                    if (!monthlyTotals[yearMonth]) {
                        monthlyTotals[yearMonth] = 0;
                    }
                    monthlyTotals[yearMonth] += Number(bill.amount);
                }
            });

            // 3. 處理統計區塊的顯示邏輯
            const activeMonths = Object.keys(monthlyTotals).sort(); // 將月份排序

            if (activeMonths.length > 0) {
                summaryCard.style.display = 'block'; // 有未繳帳單，顯示統計卡片
                
                activeMonths.forEach(yearMonth => {
                    // 將 "2026-07" 轉換成 "2026年7月"
                    const [year, month] = yearMonth.split('-');
                    const displayMonth = `${year}年${parseInt(month, 10)}月`; 
                    const totalAmount = formatCurrency(monthlyTotals[yearMonth]);

                    const div = document.createElement('div');
                    div.className = 'summary-item';
                    div.innerHTML = `<span>${displayMonth} 應繳金額：</span> <span class="summary-amount">${totalAmount}</span>`;
                    summaryContent.appendChild(div);
                });
            } else {
                summaryCard.style.display = 'none'; // 全部繳清或沒帳單時，隱藏統計卡片
            }
        }

        // 匯出資料
        function exportData() {
            if (bills.length === 0) {
                alert("目前沒有任何帳單資料可以匯出喔！");
                return;
            }
            const dataStr = JSON.stringify(bills);
            prompt("請將以下這串代碼「全選並複製」，然後透過 Line 傳到你的手機上，再使用匯入功能貼上：", dataStr);
        }

        // 匯入資料
        function importData() {
            const dataStr = prompt("請貼上你複製的資料代碼：\n(⚠️ 注意：這將會覆蓋掉目前裝置上的所有帳單記錄)");
            
            if (dataStr) {
                try {
                    const importedBills = JSON.parse(dataStr);
                    if (Array.isArray(importedBills)) {
                        bills = importedBills;
                        saveData();
                        renderBills();
                        alert("✅ 資料同步匯入成功！");
                    } else {
                        alert("❌ 匯入失敗：資料格式不正確！");
                    }
                } catch (e) {
                    alert("❌ 匯入失敗：代碼不完整或有誤，請確認是否完整複製！");
                }
            }
        }

        // 初始執行渲染
        renderBills();
    </script>
</body>
</html>
